mysql:
  host: 'localhost'
  port: 9306
  user: 'root'
  password: 'admin'

clickhouse:
  host: 'localhost'
  port: 9123
  user: 'default'
  password: 'admin'
  erase_batch_size: 2

binlog_replicator:
  data_dir: '/app/binlog/'
  records_per_file: 100000
  binlog_retention_period: 43200  # 12 hours in seconds

databases: '*test*'
log_level: 'info'
optimize_interval: 3
check_db_updated_interval: 3
skip_initial_replication: true
